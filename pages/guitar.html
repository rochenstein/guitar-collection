<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guitar — The Collection</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .video-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 1rem;
    }
    .video-tab {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.06em;
      padding: 0.35rem 0.8rem;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(247,244,238,0.5);
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
    }
    .video-tab:hover { border-color: rgba(255,255,255,0.4); color: var(--paper); }
    .video-tab.active { background: var(--accent); border-color: var(--accent); color: var(--paper); }
  </style>
</head>
<body>

  <nav class="site-nav">
    <a href="../index.html" class="nav-wordmark">The<span>&nbsp;Collection</span></a>
    <ul class="nav-links">
      <li><a href="../collection.html">Guitars</a></li>
      <li><a href="../timeline.html">Timeline</a></li>
      <li><a href="../sounds.html">Sounds</a></li>
      <li><a href="../about.html">About</a></li>
    </ul>
  </nav>

  <div id="guitar-hero" class="guitar-hero">
    <div class="guitar-hero-gallery" id="hero-gallery">
      <span id="hero-emoji"></span>
    </div>
    <div class="guitar-hero-info">
      <div class="guitar-breadcrumb">
        <a href="../collection.html">← All guitars</a>
        <span>·</span>
        <span id="breadcrumb-make"></span>
      </div>
      <div class="guitar-make-label" id="detail-make"></div>
      <h1 class="guitar-detail-title" id="detail-title"></h1>
      <div class="guitar-detail-specs" id="detail-specs"></div>
    </div>
  </div>

  <div class="guitar-story-section" id="story-section">
    <h2 class="guitar-story-header">The story</h2>
    <div class="guitar-story" id="guitar-story"></div>
  </div>

  <div class="video-section" id="video-section">
    <div style="margin-bottom:2rem;">
      <div class="label" style="color:var(--gold);">Hear it</div>
      <h2>Sounds &amp; video</h2>
    </div>
    <div id="video-container"></div>
  </div>

  <div class="prev-next" id="prev-next"></div>

  <footer class="site-footer">
    <div class="footer-inner">
      <div><div class="footer-brand-name">The Collection</div><p class="footer-blurb">A personal archive of electric and acoustic guitars.</p></div>
      <div>
        <div class="footer-col-title">Pages</div>
        <ul class="footer-links">
          <li><a href="../index.html">Home</a></li>
          <li><a href="../collection.html">All guitars</a></li>
          <li><a href="../timeline.html">Timeline</a></li>
          <li><a href="../about.html">About</a></li>
        </ul>
      </div>
      <div></div>
    </div>
    <div class="footer-bottom"><span>Built with Claude · Dublin, Ireland</span><span>© 2025</span></div>
  </footer>

  <script src="../js/guitars.js"></script>
  <script src="../js/main.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const idx = guitars.findIndex(g => g.id === id);
    const guitar = guitars[idx];

    if (!guitar) {
      document.body.innerHTML = '<div style="padding:8rem 4rem"><h1>Guitar not found</h1><a href="../collection.html">Back to collection</a></div>';
    } else {
      document.title = `${guitar.make} ${guitar.model} — The Collection`;
      document.getElementById('breadcrumb-make').textContent = guitar.make;
      document.getElementById('detail-make').textContent = `${guitar.make} · No. ${guitar.number}`;
      document.getElementById('detail-title').textContent = `${guitar.model}${guitar.year ? ', ' + guitar.year : ''}`;
      document.getElementById('hero-emoji').textContent = guitar.emoji;
      document.getElementById('hero-emoji').style.cssText = 'font-size:14rem;opacity:0.18;';

      const specs = [
        { label: 'Year',      value: guitar.year || 'Unknown' },
        { label: 'Country',   value: guitar.country },
        { label: 'Finish',    value: guitar.finish || 'Unknown' },
        { label: 'Condition', value: guitar.condition || 'Good' },
        { label: 'Body',      value: guitar.body },
        { label: 'Neck',      value: guitar.neck },
        { label: 'Pickups',   value: guitar.pickups },
        { label: 'Acquired',  value: guitar.acquired },
      ];

      document.getElementById('detail-specs').innerHTML = specs.map(s => `
        <div class="detail-spec-item">
          <div class="detail-spec-label">${s.label}</div>
          <div class="detail-spec-value">${s.value}</div>
        </div>`).join('');

      document.getElementById('guitar-story').innerHTML = guitar.story
        .trim().split(/\n\s*\n/).map(p => `<p>${p.trim()}</p>`).join('');

      // Video section
      const videoContainer = document.getElementById('video-container');
      const videos = guitar.videos || [];

      if (videos.length === 0) {
        videoContainer.innerHTML = `
          <div style="background:rgba(255,255,255,0.05);padding:3rem 2rem;text-align:center;border:1px solid rgba(255,255,255,0.08)">
            <div class="label" style="color:rgba(247,244,238,0.3);margin-bottom:0.75rem">Video coming</div>
            <p style="font-size:0.85rem;color:rgba(247,244,238,0.4)">Add a video entry to guitars.js to embed here.</p>
          </div>`;
      } else if (videos.length === 1) {
        videoContainer.innerHTML = `
          <p style="font-family:var(--font-mono);font-size:0.7rem;color:var(--gold);letter-spacing:0.08em;margin-bottom:1rem;">${videos[0].title}</p>
          <div class="video-embed" style="max-width:800px;">
            <iframe src="https://www.youtube.com/embed/${videos[0].id}" title="${videos[0].title}" allowfullscreen></iframe>
          </div>`;
      } else {
        videoContainer.innerHTML = `
          <div class="video-tabs" id="video-tabs">
            ${videos.map((v, i) => `<button class="video-tab ${i === 0 ? 'active' : ''}" data-index="${i}">${v.title}</button>`).join('')}
          </div>
          <div class="video-embed" style="max-width:800px;">
            <iframe id="video-iframe" src="https://www.youtube.com/embed/${videos[0].id}" title="${videos[0].title}" allowfullscreen></iframe>
          </div>`;

        document.getElementById('video-tabs').addEventListener('click', e => {
          if (!e.target.matches('.video-tab')) return;
          const i = parseInt(e.target.dataset.index);
          document.querySelectorAll('.video-tab').forEach(t => t.classList.remove('active'));
          e.target.classList.add('active');
          const iframe = document.getElementById('video-iframe');
          iframe.src = `https://www.youtube.com/embed/${videos[i].id}`;
          iframe.title = videos[i].title;
        });
      }

      // Prev / Next
      const prev = guitars[idx - 1];
      const next = guitars[idx + 1];
      document.getElementById('prev-next').innerHTML = `
        ${prev
          ? `<a href="guitar.html?id=${prev.id}" class="prev-next-item">
               <div class="prev-next-dir">← Previous</div>
               <div class="prev-next-name">${prev.make} ${prev.model}</div>
               <div class="label">${prev.year || prev.acquiredYear}</div>
             </a>`
          : '<div class="prev-next-item" style="opacity:0.2"><div class="prev-next-dir">← Previous</div><div class="prev-next-name">First guitar</div></div>'}
        ${next
          ? `<a href="guitar.html?id=${next.id}" class="prev-next-item">
               <div class="prev-next-dir">Next →</div>
               <div class="prev-next-name">${next.make} ${next.model}</div>
               <div class="label">${next.year || next.acquiredYear}</div>
             </a>`
          : '<div class="prev-next-item" style="opacity:0.2;text-align:right;align-items:flex-end"><div class="prev-next-dir">Next →</div><div class="prev-next-name">Last guitar</div></div>'}`;
    }
  </script>
</body>
</html>
